services:
  postgres:
    image: postgres:16
    container_name: operations-dashboard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: operations_dashboard
    ports:
      - "5432:5432"
    volumes:
      - operations_dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d operations_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  operations_dashboard_pgdata:
